name: Build and Deploy to EC2

# ============================================================
# Required GitHub Secrets:
#   AWS_ROLE_ARN          — arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME
#   AWS_REGION            — e.g. us-east-1
#   ECR_REGISTRY          — e.g. 412128478995.dkr.ecr.us-east-1.amazonaws.com
#   ECR_REPOSITORY        — e.g. testrepoforpms
#   ALLOWED_TEAM_NAME     — e.g. BillBox
#   EC2_HOST              — EC2 public IP or DNS
#   EC2_USER              — e.g. ubuntu
#   EC2_SSH_KEY           — private key contents
# ============================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, test, prod, feature]
      team_name:
        description: "Team name"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  CONTAINER_NAME: pms-app   # ← Update container name here if needed
  CONTAINER_PORT: 3000       # ← Update container port here if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Validate team name ───────────────────────
      - name: Validate team name
        run: |
          if [ "${{ github.event.inputs.team_name }}" != "${{ secrets.ALLOWED_TEAM_NAME }}" ]; then
            echo "Invalid team name. Only '${{ secrets.ALLOWED_TEAM_NAME }}' is permitted."
            exit 1
          fi

      # ── Install AWS CLI v2 ───────────────────────
      - name: Install AWS CLI v2
        run: |
          if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
            echo "AWS CLI v2 already present."
          else
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      # ── Authenticate to AWS via OIDC ─────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      # ── Login to ECR ─────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ─────────────────
      - name: Build and push image to ECR
        id: build
        run: |
          IMAGE_TAG="${{ github.event.inputs.environment }}-${{ github.sha }}"
          FULL_IMAGE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG"
          LATEST_IMAGE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.event.inputs.environment }}-latest"

          echo "Building image: $FULL_IMAGE"

          docker build -t "$FULL_IMAGE" -t "$LATEST_IMAGE" .

          echo "Pushing to ECR..."
          docker push "$FULL_IMAGE"
          docker push "$LATEST_IMAGE"

          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "latest=$LATEST_IMAGE" >> $GITHUB_OUTPUT
          echo "Image pushed: $FULL_IMAGE"

      # ── SSH into EC2 and redeploy ─────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            TEAM_NAME="${{ github.event.inputs.team_name }}"
            APP_ENV="${{ github.event.inputs.environment }}"
            IMAGE="${{ steps.build.outputs.latest }}"
            CONTAINER_NAME="${{ env.CONTAINER_NAME }}"
            NEW_CONTAINER="${{ env.CONTAINER_NAME }}-new"
            REGION="${{ secrets.AWS_REGION }}"
            REGISTRY="${{ secrets.ECR_REGISTRY }}"
            PORT="${{ env.CONTAINER_PORT }}"
            NEW_PORT=$(( PORT + 1 ))

            echo "Logging in to ECR..."
            aws ecr get-login-password --region $REGION \
              | docker login --username AWS --password-stdin $REGISTRY

            echo "Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "Starting new container on port $NEW_PORT..."
            docker stop "$NEW_CONTAINER" 2>/dev/null || true
            docker rm   "$NEW_CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$NEW_CONTAINER" \
              --restart unless-stopped \
              -p "$NEW_PORT:$PORT" \
              -e TEAM_NAME="$TEAM_NAME" \
              -e APP_ENV="$APP_ENV" \
              "$IMAGE"

            echo "Waiting for new container to be ready..."
            sleep 5

            echo "Health check on new container..."
            if curl -sf http://localhost:$NEW_PORT/health; then
              echo "New container is healthy!"

              echo "Stopping old container..."
              docker stop "$CONTAINER_NAME" 2>/dev/null || true
              docker rm   "$CONTAINER_NAME" 2>/dev/null || true

              echo "Renaming new container to $CONTAINER_NAME..."
              docker rename "$NEW_CONTAINER" "$CONTAINER_NAME"

              echo "Updating port binding — restarting on correct port $PORT..."
              docker stop "$CONTAINER_NAME"
              docker rm   "$CONTAINER_NAME"

              docker run -d \
                --name "$CONTAINER_NAME" \
                --restart unless-stopped \
                -p "$PORT:$PORT" \
                -e TEAM_NAME="$TEAM_NAME" \
                -e APP_ENV="$APP_ENV" \
                "$IMAGE"

              sleep 3
              curl -sf http://localhost:$PORT/health && echo "App is healthy on port $PORT" || echo "Health check failed — check docker logs $CONTAINER_NAME"

            else
              echo "New container health check FAILED — rolling back!"
              docker stop "$NEW_CONTAINER" 2>/dev/null || true
              docker rm   "$NEW_CONTAINER" 2>/dev/null || true
              echo "Old container is still running. Deployment aborted."
              exit 1
            fi

            echo ""
            echo "──────────────────────────────"
            echo "Deployed: $IMAGE"
            echo "   Team:     $TEAM_NAME"
            echo "   Env:      $APP_ENV"
            echo "──────────────────────────────"